<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- PNG app icon, sized PNG fallbacks, apple-touch-icon for iOS -->
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon-16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <title>1TomatoMap: Custom Map Poster Studio</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Create print-ready custom map posters for any location in the world. 1TomatoMap is an independent open-source project based on Terraink."
    />
    <meta
      name="keywords"
      content="map poster, map art generator, print poster map, OpenStreetMap poster, custom map art, city print, 1tomatomap"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="1TomatoMap contributors" />
    <meta name="copyright" content="1TomatoMap contributors" />

    <!-- Theme colour -->
    <meta name="theme-color" content="#0a1824" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="1TomatoMap" />
    <meta name="msapplication-TileColor" content="#0a1824" />
    <link rel="mask-icon" href="/assets/logo-mask.svg" color="#2f2850" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="1TomatoMap" />
    <meta
      property="og:title"
      content="1TomatoMap: Custom Map Poster Studio"
    />
    <meta
      property="og:description"
      content="Create print-ready custom map posters for any location in the world. 1TomatoMap is an independent open-source project based on Terraink."
    />
    <meta property="og:image" content="/assets/icon-512.png" />
    <meta property="og:image:alt" content="1TomatoMap logo" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="1TomatoMap: Custom Map Poster Studio"
    />
    <meta
      name="twitter:description"
      content="Create print-ready custom map posters for any location in the world with 1TomatoMap."
    />
    <meta name="twitter:image" content="/assets/icon-512.png" />
    <meta name="twitter:image:alt" content="1TomatoMap logo" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "1TomatoMap",
        "description": "Independent open-source map poster generator based on Terraink. Design and export print-ready map posters for any location in the world.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Custom map posters for any location",
          "Powered by OpenStreetMap data",
          "High-resolution PNG export",
          "Dozens of curated themes",
          "Custom colour palettes",
          "Typography controls with curated Latin and CJK fonts"
        ],
        "creator": {
          "@type": "Organization",
          "name": "1TomatoMap contributors"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
